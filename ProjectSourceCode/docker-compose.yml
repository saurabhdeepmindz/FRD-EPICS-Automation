version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prd-gen-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prd_generator
      POSTGRES_USER: prd_user
      POSTGRES_PASSWORD: prd_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prd_user -d prd_generator']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prd-gen-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://prd_user:prd_secret@postgres:5432/prd_generator
      AI_SERVICE_URL: http://ai-service:5000
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: prd-gen-ai
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    environment:
      PORT: 5000
    ports:
      - '5000:5000'
    volumes:
      - ./ai-service:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prd-gen-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
